name: CI
on:
  push:
    branches: [main]
    paths: ["src/**", "tests/**", "package.json", "package-lock.json", "tsconfig.json", "biome.json", "tsup.config.ts", "vitest.config.ts", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["src/**", "tests/**", "package.json", "package-lock.json", "tsconfig.json", "biome.json", "tsup.config.ts", "vitest.config.ts", ".github/workflows/ci.yml"]
  workflow_dispatch:
permissions: { contents: read }
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite (the default SQLite driver) is flagged on 22.x, stable on 24.x.
        include:
          - node: "22"
            node_options: "--experimental-sqlite"
          - node: "24"
            node_options: ""
    name: node ${{ matrix.node }}
    env:
      NODE_OPTIONS: ${{ matrix.node_options }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Lint (biome)
        run: npm run lint
      - name: Type-check (tsc --noEmit)
        run: npm run test:types
      - name: Tests (vitest — runtime + type tests)
        run: npm test
      - name: Build (tsup → ESM + CJS + d.ts)
        run: npm run build
